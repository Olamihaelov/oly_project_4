<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Time Prediction — User Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #edf1f6;
            --surface:      #ffffff;
            --surface-2:    #f4f7fb;
            --border:       #d4dfe9;
            --border-bright:#b8ccdd;
            --accent:       #1a46ff;
            --accent-dim:   rgba(26,70,255,0.07);
            --accent-glow:  rgba(26,70,255,0.22);
            --text:         #0a1828;
            --text-muted:   #6e8fa8;
            --text-dim:     #c0d0de;
            --red:          #e8203a;
            --red-dim:      rgba(232,32,58,0.08);
            --green:        #00a86a;
            --green-dim:    rgba(0,168,106,0.08);
            --blue:         #0090d8;
            --blue-dim:     rgba(0,144,216,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            font-weight: 400;
            background-color: var(--bg);
            background-image:
                linear-gradient(rgba(180,200,220,0.45) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180,200,220,0.45) 1px, transparent 1px);
            background-size: 52px 52px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 28px 20px;
            color: var(--text);
        }

        /* ── Brand mark ── */
        .brand {
            text-align: center;
            margin-bottom: 28px;
            animation: fadeDown 0.45s ease both;
        }

        .brand .eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--accent);
            display: block;
            margin-bottom: 4px;
        }

        .brand h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.8rem;
            letter-spacing: 0.06em;
            color: var(--text);
            line-height: 1;
        }

        /* ── Card ── */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--border);
            position: relative;
            animation: fadeUp 0.5s ease both;
            animation-delay: 0.08s;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 24px var(--accent-glow), 0 0 60px rgba(200,255,0,0.10);
        }

        /* ── Tab bar ── */
        .tab-buttons {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 14px 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            transition: all 0.2s;
            width: auto;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transform: none;
            box-shadow: none;
        }

        .tab-btn:hover {
            color: var(--text);
            background: var(--accent-dim);
            transform: none;
            box-shadow: none;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--accent-dim);
        }

        /* ── Tab content ── */
        .tab-content {
            display: none;
            padding: 28px;
        }

        .tab-content.active {
            display: block;
        }

        .tab-content h2 {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            letter-spacing: 0.08em;
            color: var(--text);
            margin-bottom: 22px;
        }

        /* ── Forms ── */
        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.63rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 0 20px var(--accent-dim);
        }

        input::placeholder { color: var(--text-dim); }

        input:disabled {
            background: var(--surface-2);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* ── Buttons ── */
        button {
            display: block;
            width: 100%;
            padding: 11px 20px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #2a56ff;
            box-shadow: 0 0 28px var(--accent-glow);
            transform: translateY(-1px);
        }

        button:active { transform: translateY(0); }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(255,59,92,0.4);
            margin-top: 10px;
        }

        .btn-danger:hover {
            background: var(--red-dim);
            border-color: var(--red);
            box-shadow: 0 0 16px rgba(255,59,92,0.18);
            color: var(--red);
        }

        .btn-neutral {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .btn-neutral:hover {
            background: var(--surface-2);
            border-color: var(--border-bright);
            color: var(--text);
            box-shadow: none;
        }

        /* ── Messages ── */
        .message {
            padding: 11px 14px;
            margin-top: 14px;
            display: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.74rem;
            border-left: 2px solid;
            line-height: 1.5;
        }

        .message.success { background: var(--green-dim); color: var(--green); border-color: var(--green); }
        .message.error   { background: var(--red-dim);   color: var(--red);   border-color: var(--red);   }

        /* ── Profile ── */
        #login-prompt {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
        }

        /* ── Users table ── */
        #users-container {
            max-height: 420px;
            overflow-y: auto;
        }

        #users-container::-webkit-scrollbar {
            width: 4px;
        }

        #users-container::-webkit-scrollbar-track {
            background: var(--surface-2);
        }

        #users-container::-webkit-scrollbar-thumb {
            background: var(--border-bright);
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table thead {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .users-table th {
            padding: 10px 12px;
            text-align: left;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }

        .users-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            color: var(--text);
        }

        .users-table tbody tr:hover td {
            background: var(--accent-dim);
        }

        .users-table tbody tr:last-child td {
            border-bottom: none;
        }

        .user-id {
            color: var(--accent);
            font-weight: 700;
        }

        .user-credits {
            display: inline-block;
            background: var(--accent-dim);
            color: var(--accent);
            padding: 3px 8px;
            font-size: 0.72rem;
            font-weight: 700;
            border: 1px solid rgba(200,255,0,0.2);
        }

        .users-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 28px 20px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.06em;
        }

        /* ── Nav ── */
        .nav-links {
            text-align: center;
            padding: 16px 28px;
            border-top: 1px solid var(--border);
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.68rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--accent); }

        /* ── Animations ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            body { padding: 16px 12px; }
            .tab-btn { font-size: 0.54rem; letter-spacing: 0.10em; }
        }
    </style>
</head>
<body>
    <div class="brand">
        <span class="eyebrow">Athlete Analytics Platform</span>
        <h1>User Management</h1>
    </div>

    <div class="container">
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="register">Register</button>
            <button class="tab-btn" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="profile">Profile</button>
            <button class="tab-btn" data-tab="users">All Users</button>
        </div>

        <!-- Register Tab -->
        <div id="register" class="tab-content active">
            <h2>Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit">Create Account</button>
            </form>
            <div id="reg-message" class="message"></div>
        </div>

        <!-- Login Tab -->
        <div id="login" class="tab-content">
            <h2>Sign In</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <div id="login-message" class="message"></div>
        </div>

        <!-- Profile Tab -->
        <div id="profile" class="tab-content">
            <h2>Profile</h2>
            <div id="profile-content" style="display: none;">
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" id="profile-id" disabled>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="profile-username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="profile-email">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="profile-password">
                </div>
                <button type="button" onclick="updateProfile()">Update Profile</button>
                <button type="button" class="btn-danger" onclick="deleteAccount()">Delete Account</button>
                <button type="button" class="btn-neutral" onclick="logout()">Sign Out</button>
            </div>
            <div id="profile-message" class="message"></div>
            <div id="login-prompt">
                <p>Please sign in to view your profile</p>
            </div>
        </div>

        <!-- All Users Tab -->
        <div id="users" class="tab-content">
            <h2>All Users</h2>
            <div id="users-container">
                <div class="users-empty">Loading users…</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/ml">Go to ML Operations →</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const tabName = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active');
                });
                document.getElementById(tabName).classList.add('active');
                btn.classList.add('active');

                if (tabName === 'profile') {
                    checkAuthAndLoadProfile();
                } else if (tabName === 'users') {
                    loadAllUsers();
                }
            });
        });

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch(`${API_BASE}/users/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_name: username, email, password })
                });

                const data = await response.json();
                const msgEl = document.getElementById('reg-message');

                if (response.ok) {
                    msgEl.classList.remove('error');
                    msgEl.classList.add('success');
                    msgEl.textContent = '✅ Registration successful! You can now login.';
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
                        document.querySelector('[data-tab="login"]').click();
                    }, 1500);
                } else {
                    msgEl.classList.remove('success');
                    msgEl.classList.add('error');
                    let errorMsg = 'Registration failed';
                    if (data.detail) {
                        if (typeof data.detail === 'string') {
                            errorMsg = data.detail;
                        } else if (Array.isArray(data.detail)) {
                            errorMsg = data.detail.map(e => e.msg || e).join(', ');
                        }
                    }
                    msgEl.textContent = '❌ Error: ' + errorMsg;
                }
                msgEl.style.display = 'block';
            } catch (error) {
                const msgEl = document.getElementById('reg-message');
                msgEl.classList.remove('success');
                msgEl.classList.add('error');
                msgEl.textContent = '❌ Error: ' + error.message;
                msgEl.style.display = 'block';
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const msgEl = document.getElementById('login-message');

            if (!username || !password) {
                msgEl.classList.remove('success');
                msgEl.classList.add('error');
                msgEl.textContent = '❌ Error: Please enter both username and password';
                msgEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                let data;
                try {
                    data = await response.json();
                } catch (parseError) {
                    // Response is not JSON - log raw response
                    console.error('Response not JSON:', response.status, response.statusText);
                    const responseText = await response.text();
                    console.error('Response body:', responseText);
                    msgEl.classList.remove('success');
                    msgEl.classList.add('error');
                    msgEl.textContent = '❌ Error: Server error (Status ' + response.status + ') - please try again';
                    msgEl.style.display = 'block';
                    return;
                }

                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.user_name);
                    localStorage.setItem('userId', data.id);
                    msgEl.classList.remove('error');
                    msgEl.classList.add('success');
                    msgEl.innerHTML = `✅ Login successful!<br><br><strong>Your Token:</strong><br><code style="display:block; background:#f0f0f0; padding:10px; margin-top:10px; word-break: break-all; border-radius:4px; font-size: 12px;">${data.access_token}</code>`;
                    msgEl.style.display = 'block';
                    setTimeout(async () => {
                        document.querySelector('[data-tab="profile"]').click();
                        await loadProfileData(data.access_token);
                    }, 500);
                } else {
                    msgEl.classList.remove('success');
                    msgEl.classList.add('error');
                    let errorMsg = 'Login failed';
                    if (data.detail) {
                        if (typeof data.detail === 'string') {
                            errorMsg = data.detail;
                        } else if (Array.isArray(data.detail)) {
                            errorMsg = data.detail.map(e => e.msg || e).join(', ');
                        }
                    }
                    msgEl.textContent = '❌ Error: ' + errorMsg;
                    msgEl.style.display = 'block';
                }
            } catch (error) {
                const msgEl = document.getElementById('login-message');
                msgEl.classList.remove('success');
                msgEl.classList.add('error');
                msgEl.textContent = '❌ Error: ' + error.message;
                msgEl.style.display = 'block';
            }
        });

        // Check auth and load profile
        async function checkAuthAndLoadProfile() {
            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');

            if (token && username) {
                document.getElementById('login-prompt').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';
                document.getElementById('profile-username').value = username;
                document.getElementById('profile-email').value = '';

                const loaded = await loadProfileData(token);
                if (!loaded) {
                    localStorage.clear();
                    document.getElementById('login-prompt').style.display = 'block';
                    document.getElementById('profile-content').style.display = 'none';
                    alert('❌ Your session has expired. Please login again.');
                }
            } else {
                document.getElementById('login-prompt').style.display = 'block';
                document.getElementById('profile-content').style.display = 'none';
            }
        }

        // Load profile data
        async function loadProfileData(token) {
            try {
                const userId = localStorage.getItem('userId');
                if (!userId) {
                    console.error('No userId found in localStorage');
                    return false;
                }
                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('profile-id').value = `#${data.id}`;
                    document.getElementById('profile-username').value = data.user_name || '';
                    document.getElementById('profile-email').value = data.email || '';
                    return true;
                } else if (response.status === 401) {
                    console.warn('Unauthorized - Token has expired');
                    return false;
                } else {
                    console.error('Failed to load profile:', response.statusText);
                    return false;
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                return false;
            }
        }

        // Update profile
        async function updateProfile() {
            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            
            if (!token || !userId) {
                alert('❌ Session expired. Please login again.');
                localStorage.clear();
                location.reload();
                return;
            }

            const username = document.getElementById('profile-username').value;
            const email = document.getElementById('profile-email').value;
            const password = document.getElementById('profile-password').value;

            if (!username) {
                alert('Username cannot be empty!');
                return;
            }

            try {
                const requestBody = {
                    user_name: username || null,
                    email: email || null,
                    password: password || null
                };

                Object.keys(requestBody).forEach(key => requestBody[key] === null && delete requestBody[key]);

                console.log('Update request:', { userId, token: token.substring(0, 20) + '...', body: requestBody });

                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(requestBody)
                });

                const msgEl = document.getElementById('profile-message');

                console.log('Response status:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    msgEl.classList.remove('error');
                    msgEl.classList.add('success');
                    msgEl.textContent = '✅ Profile updated successfully!';
                    document.getElementById('profile-password').value = '';
                    msgEl.style.display = 'block';
                    
                    // Auto-logout for security after profile update
                    setTimeout(() => {
                        alert('⚠️ Your profile has been updated. Please log in again for security.');
                        localStorage.clear();
                        sessionStorage.clear();
                        location.reload();
                    }, 1500);
                } else if (response.status === 401) {
                    let errorMessage = 'Session expired. Please login again.';
                    try {
                        const errorData = await response.json();
                        console.error('Auth error:', errorData);
                        if (errorData.detail) {
                            errorMessage = typeof errorData.detail === 'string' ? errorData.detail : JSON.stringify(errorData.detail);
                        }
                    } catch (e) {}
                    msgEl.classList.remove('success');
                    msgEl.classList.add('error');
                    msgEl.textContent = '❌ ' + errorMessage;
                    setTimeout(() => {
                        localStorage.clear();
                        location.reload();
                    }, 3000);
                } else {
                    let errorMessage = 'Failed to update profile';
                    try {
                        const data = await response.json();
                        console.error('Update error:', data);
                        if (data.detail) {
                            if (Array.isArray(data.detail)) {
                                errorMessage = data.detail.map(e => typeof e === 'string' ? e : (e.msg || JSON.stringify(e))).join('; ');
                            } else if (typeof data.detail === 'string') {
                                errorMessage = data.detail;
                            } else {
                                errorMessage = JSON.stringify(data.detail);
                            }
                        }
                    } catch (e) {}
                    msgEl.classList.remove('success');
                    msgEl.classList.add('error');
                    msgEl.textContent = '❌ Error: ' + errorMessage;
                }
                msgEl.style.display = 'block';
            } catch (error) {
                const msgEl = document.getElementById('profile-message');
                msgEl.classList.remove('success');
                msgEl.classList.add('error');
                msgEl.textContent = '❌ Error: ' + error.message;
                console.error('Exception:', error);
                msgEl.style.display = 'block';
            }
        }

        // Delete account
        async function deleteAccount() {
            if (!confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                return;
            }

            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            
            if (!token || !userId) {
                alert('❌ Session expired. Please login again.');
                localStorage.clear();
                location.reload();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    localStorage.clear();
                    alert('✅ Account deleted successfully');
                    location.reload();
                } else if (response.status === 401) {
                    alert('❌ Session expired. Please login again.');
                    localStorage.clear();
                    location.reload();
                } else {
                    const data = await response.json();
                    let errorMsg = 'Unknown error';
                    if (data.detail) {
                        if (typeof data.detail === 'string') {
                            errorMsg = data.detail;
                        } else if (Array.isArray(data.detail)) {
                            errorMsg = data.detail.map(e => e.msg || e).join(', ');
                        } else {
                            errorMsg = JSON.stringify(data.detail);
                        }
                    }
                    alert('❌ Error deleting account: ' + errorMsg);
                }
            } catch (error) {
                alert('❌ Error deleting account: ' + error.message);
            }
        }

        // Logout
        function logout() {
            localStorage.clear();
            document.querySelector('[data-tab="login"]').click();
            document.getElementById('loginForm').reset();
        }

        // Load all users
        async function loadAllUsers() {
            try {
                const response = await fetch(`${API_BASE}/users/`);

                if (response.ok) {
                    const users = await response.json();
                    const container = document.getElementById('users-container');

                    if (users.length === 0) {
                        container.innerHTML = '<div class="users-empty">No users found</div>';
                        return;
                    }

                    let html = '<table class="users-table"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Credits</th></tr></thead><tbody>';

                    users.forEach(user => {
                        html += `<tr>
                            <td class="user-id">#${user.id}</td>
                            <td>${user.user_name}</td>
                            <td>${user.email}</td>
                            <td><span class="user-credits">${user.predictions_remaining}</span></td>
                        </tr>`;
                    });

                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    const container = document.getElementById('users-container');
                    container.innerHTML = '<div class="users-empty" style="color:var(--red)">Failed to load users</div>';
                }
            } catch (error) {
                const container = document.getElementById('users-container');
                container.innerHTML = '<div class="users-empty" style="color:var(--red)">Error: ' + error.message + '</div>';
            }
        }
    </script>
</body>
</html>
